confirmation:
  subject: 'Підтвердіть підписку в %project_name%'
  body: |
    Вітаємо,

    Хтось запросив підписку на відстеження ціни в %project_name% для цього оголошення OLX:

    Оголошення: %title%
    URL: %url%

    Email-адреса: %email%

    Якщо це були ви, підтвердіть підписку за посиланням нижче:

    %confirmation_url%

    Після підтвердження %project_name% відстежуватиме ціну оголошення та повідомлятиме вас email-листом, коли ціна зміниться.

    Якщо ви не запитували цю підписку, просто проігноруйте цей лист. Підписка залишиться неактивною, і ви не отримуватимете повідомлення про зміну ціни.

    Це посилання для підтвердження діє %ttl_hours% годин.

    --
    %project_name%

price_changed:
  subject: 'Зміна ціни OLX: %title%'
  body: |
    Вітаємо,

    Ви підписані на відстеження ціни цього оголошення OLX через %project_name%:

    Оголошення: %title%
    URL: %url%

    Ціна оголошення змінилася:

    Стара ціна: %old_price%
    Нова ціна: %new_price%

    Відкрити оголошення можна тут:
    %url%

    Якщо ви не підписувалися на це відстеження, просто проігноруйте цей лист.

    --
    %project_name%

listing_unavailable:
  subject: 'Оголошення OLX більше не доступне'
  body: |
    Вітаємо,

    Ви підписані на відстеження цього оголошення OLX через %project_name%:

    Оголошення: %title%
    URL: %url%

    Система не змогла знайти це оголошення на OLX після %unavailable_threshold% послідовних перевірок.
    Можливо, його продали, видалили або воно тимчасово недоступне.

    Поки оголошення недоступне, нові повідомлення про зміну ціни не надсилатимуться.
    Якщо оголошення знову стане доступним, відстеження може відновитися автоматично.

    Якщо ви не підписувалися на це відстеження, просто проігноруйте цей лист.

    --
    %project_name%
